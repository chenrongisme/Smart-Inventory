version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=fdsfse4324r4234rf43t543
      - DATABASE_URL=./data/inventory.db
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123
    volumes:
      - .:/app               # 映射整个项目到 /app (满足你的要求)
      - /app/node_modules    # 保护容器内的 node_modules 不被宿主机覆盖 (非常重要)
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: always
