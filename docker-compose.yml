version: '3.8'

services:
  app:
    build: .
    container_name: smart-inventory
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=local-app-secret-no-login-required
      - DATABASE_URL=./data/inventory.db
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
    volumes:
      # 挂载数据和上传目录，实现持久化
      - ./data:/app/data
      - ./uploads:/app/uploads
      # 关键：使用匿名卷覆盖容器内的 node_modules，防止宿主机的 node_modules 干扰容器
      - /app/node_modules
    restart: always
