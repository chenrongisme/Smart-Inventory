version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your-secure-jwt-secret
      - DATABASE_URL=./data/inventory.db
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=admin123
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: always
